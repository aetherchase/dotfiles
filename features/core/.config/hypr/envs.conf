
# NVIDIA (Turing+ with GSP firmware)
env = NVD_BACKEND,direct
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

# NVIDIA shader disk cache -> off root nvme onto storage-m2 (keep work disk lean).
# Default 128MB cap was full (~135M) and evicting every launch -> Steam "Processing
# Vulkan shaders" rebuilt the driver pipeline cache on every game start. Single games
# here hold up to ~4.6G of Fossilize pipelines, so cap must dwarf that: 64G.
# PATH is the parent; driver creates GLCache/ under it. storage-m2 = ntfs3, 306G free.
env = __GL_SHADER_DISK_CACHE,1
env = __GL_SHADER_DISK_CACHE_PATH,/mnt/storage-m2/ShaderCache/nvidia
env = __GL_SHADER_DISK_CACHE_SIZE,68719476736

# XWayland DPI for fractional scaling. Omarchy sets xwayland:force_zero_scaling=true
# (XWayland renders at native 1x, no compositor upscale -> crisp but tiny). CEF/Chromium
# apps (Steam) derive device scale from Xft.dpi at runtime; 120 = 96 * 1.25 (DP-2 scale).
# MACHINE-SPECIFIC: 120 tracks the 1.25 monitor scale. Steam's own STEAM_FORCE_DESKTOPUI_SCALING
# / -forcedesktopscaling are inert on the current CEF build (never emit --force-device-scale-factor).
exec-once = echo "Xft.dpi: 120" | xrdb -merge
