# Float-mode daemon — auto-floats new windows on float-mode workspaces
exec-once = python3 ~/.config/hypr/float-daemon.py

# Window rules for app-specific behavior

# ueberzugpp — yazi image preview overlay
# Prevent it from tiling, stealing focus, or triggering animations
windowrule = float on,                          match:class ueberzugpp
windowrule = no_focus on,                       match:class ueberzugpp
windowrule = no_anim on,                        match:class ueberzugpp
windowrule = suppress_event activate activatefocus, match:class ueberzugpp

# ── Startup layout ──────────────────────────────────────────────────────────
# Launch a fixed session on login, then pin each window with workspace rules.
# All assignments use ` silent` so nothing yanks focus off workspace 1 while
# the session builds. Classes verified from `hyprctl clients`:
#   chrome=google-chrome  vscode=code-oss  spotify=Spotify  steam=steam  cliq=cliq
# Two code-oss windows share one class, so they're split by title (folder name).

# WS1: Google Chrome (restores last session via Chrome's own setting), tiled
exec-once = uwsm-app -- google-chrome-stable
windowrule = workspace 1 silent, match:class google-chrome

# WS2: VS Code on the webapp.users project, tiled.
# Two code-oss windows share a class, so this rule ANDs class + title. Multiple
# match: selectors only AND inside the BLOCK form — on one inline line the extra
# match: is silently ignored, so the block form is required here.
exec-once = uwsm-app -- code-oss --new-window ~/Projects/webapp.users
windowrule {
    name = code-webapp-users
    match:class = code-oss
    match:title = .*webapp.users.*
    workspace = 2 silent
}

# WS3: VS Code on localdeploy + a kitty running lazydocker (custom class), tiled
exec-once = uwsm-app -- code-oss --new-window ~/Projects/localdeploy
exec-once = uwsm-app -- kitty --class lazydocker -e lazydocker
windowrule {
    name = code-localdeploy
    match:class = code-oss
    match:title = .*localdeploy.*
    workspace = 3 silent
}
windowrule = workspace 3 silent, match:class lazydocker

# SUPER+S scratchpad (special:scratchpad): Spotify + Vesktop, both floating
exec-once = uwsm-app -- spotify
exec-once = uwsm-app -- vesktop
windowrule = workspace special:scratchpad silent, match:class Spotify
windowrule = float on,                            match:class Spotify
windowrule = workspace special:scratchpad silent, match:class vesktop
windowrule = float on,                            match:class vesktop

# SUPER+F1 scratchpad (special:scratchpad1): Zoho Cliq, tiled (default)
exec-once = uwsm-app -- /opt/Cliq/cliq
windowrule = workspace special:scratchpad1 silent, match:class cliq
