# Google Chrome launch flags. Read by the /usr/bin/google-chrome-stable wrapper
# via `grep -v '^#' $XDG_CONFIG_HOME/chrome-flags.conf`, so it applies to BOTH
# the Hyprland autostart (rules.conf: `uwsm-app -- google-chrome-stable`) and
# any launcher/.desktop launch — the wrapper sources this on every start.
--password-store=gnome-libsecret
--ozone-platform-hint=wayland
--gtk-version=4
--ignore-gpu-blocklist
--enable-features=TouchpadOverscrollHistoryNavigation
# Middle-click-hold + drag autoscroll (Windows-style). MUST be --enable-blink-
# features (it is a Blink dev feature), NOT --enable-features — the latter is a
# different namespace and silently no-ops. Off by default on Linux because
# middle-click is primary-selection paste; paste still works in text fields.
# Chrome shows a harmless "unsupported flag" warning bar.
--enable-blink-features=MiddleClickAutoscroll
--enable-wayland-ime
--disable-features=ExtensionManifestV2Unsupported
