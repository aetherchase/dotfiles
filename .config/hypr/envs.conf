
# NVIDIA (Turing+ with GSP firmware)
env = NVD_BACKEND,direct
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

# XWayland DPI for fractional scaling. Omarchy sets xwayland:force_zero_scaling=true
# (XWayland renders at native 1x, no compositor upscale -> crisp but tiny). CEF/Chromium
# apps (Steam) derive device scale from Xft.dpi at runtime; 120 = 96 * 1.25 (DP-2 scale).
# MACHINE-SPECIFIC: 120 tracks the 1.25 monitor scale. Steam's own STEAM_FORCE_DESKTOPUI_SCALING
# / -forcedesktopscaling are inert on the current CEF build (never emit --force-device-scale-factor).
exec-once = echo "Xft.dpi: 120" | xrdb -merge
