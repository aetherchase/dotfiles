# Change the default Omarchy look'n'feel

# Theme-driven border gradient (generated by ~/.config/omarchy/hooks/theme-set)
source = ~/.config/hypr/theme-border.conf

# https://wiki.hypr.land/Configuring/Basics/Variables/#general
general {
    # No gaps between windows or borders
    # gaps_in = 0
    # gaps_out = 0
    # border_size = 0

    gaps_in = 2

    # Tighter gap below floating bar, keep 10px on other sides
    gaps_out = 4 10 10 10

    border_size = 1
    # col.active_border + col.inactive_border set dynamically by ~/.config/omarchy/hooks/theme-set
    # (neutral hairline matching the Walker launcher card)

    # Change to niri-like side-scrolling layout
    # layout = scrolling
}

# https://wiki.hypr.land/Configuring/Basics/Variables/#decoration
decoration {
    # Use round window corners (matches the launcher card's 16px)
    rounding = 16

    # Dim unfocused windows — the focus cue, since borders are neutral on both states
    dim_inactive = true
    dim_strength = 0.12
}

# https://wiki.hypr.land/Configuring/Basics/Variables/#cursor
cursor {
    no_warps = true
    warp_on_change_workspace = 0
}

# https://wiki.hypr.land/Configuring/Basics/Variables/#animations
animations {
    # Disable all animations
    # enabled = no

    # Snappy screen-magnifier zoom (SUPER+scroll). speed in ds (1ds=100ms);
    # 'quick' bezier is Omarchy's snappiest curve.
    animation = zoomFactor, 1, 2, quick
}

# Walker launcher: frosted-glass backdrop blur behind the translucent card.
# Pairs with the omarchy-custom walker theme (~/.config/walker/themes/omarchy-custom).
# ignore_alpha blurs only pixels above this opacity so the card's translucency shows blur.
layerrule = blur on, match:namespace walker
layerrule = ignore_alpha 0.5, match:namespace walker

# Window-specific opacity overrides
windowrule = opacity 0.90 0.82, match:class code-oss
windowrule = opacity 0.92 0.88, match:class vesktop
windowrule = opacity 0.80 0.70, match:class Spotify
windowrule = opacity 0.80 0.80, match:class io.missioncenter.MissionCenter
windowrule = opacity 0.92 0.90, match:class cliq
windowrule = opacity 0.90 0.88, match:class obsidian

# https://wiki.hypr.land/Configuring/Basics/Variables/#layout
layout {
    # Avoid overly wide single-window layouts on wide screens
    # single_window_aspect_ratio = 1 1
}

# https://wiki.hypr.land/Configuring/Layouts/Scrolling-Layout/
scrolling {
    # See only one column per screen instead of two
    # column_width = 0.97
}
