# Machine-specific mouse device tuning for this PC's peripherals.
# Flat accel (Windows-like, no pointer acceleration). Device names from `hyprctl devices`.
# Sourced by input.conf.

device {
  name = compx-2.4g-wireless-receiver
  accel_profile = flat
  sensitivity = -0.3
}

device {
  name = compx-2.4g-dual-mode-mouse
  accel_profile = flat
  sensitivity = -0.3
}
