# Machine-specific mouse device tuning for this PC's peripherals.
# accel_profile = custom: libinput curve mimicking Windows "Enhance pointer
# precision". Generated by scripts/win-accel.py (device_dpi=2400, scaling=1.3,
# sens=1.0). Regenerate + repaste if mouse DPI differs (DPI scales `step` only).
# NOT bit-exact (Windows adds temporal smoothing a static curve can't match).
# Device names from `hyprctl devices`. Sourced by input.conf.

device {
  name = compx-2.4g-wireless-receiver
  accel_profile = custom 0.5146746014 0.000 0.236 0.473 0.828 1.184 1.540 1.927 2.467 3.008 3.548 4.089 4.629 5.169 5.710 6.250 6.791 7.331 7.871 8.412 9.528
}

device {
  name = compx-2.4g-dual-mode-mouse
  accel_profile = custom 0.5146746014 0.000 0.236 0.473 0.828 1.184 1.540 1.927 2.467 3.008 3.548 4.089 4.629 5.169 5.710 6.250 6.791 7.331 7.871 8.412 9.528
}


# scroll-debounce virtual device (re-emits the grabbed Compx 2.4G). Same tuning
# so feel is identical whether the daemon is running or not. Name = SD_VIRTUAL_NAME.
device {
  name = compx-2.4g-debounced
  accel_profile = custom 0.5146746014 0.000 0.236 0.473 0.828 1.184 1.540 1.927 2.467 3.008 3.548 4.089 4.629 5.169 5.710 6.250 6.791 7.331 7.871 8.412 9.528
}

