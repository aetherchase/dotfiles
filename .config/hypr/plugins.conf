# Hyprland plugins config
# Install plugins first:
#   hyprpm update
#   hyprpm add https://github.com/sandwichfarm/hyprexpo
#   hyprpm enable hyprexpo
#   hyprpm reload

# Load enabled hyprpm plugins at startup; without this the hyprexpo
# dispatchers are missing at config-parse time and configerrors fills
# with "hyprexpo:* does not exist" after every reboot.
exec-once = hyprpm reload -n

plugin {
    hyprexpo {
        columns = 3
        gaps_in = 15
        gaps_out = 60
        bg_col = rgb(111111)
        workspace_method = first 1
        gesture_distance = 300

        label_enable = 0
        keynav_enable = 1
    }
}

# Keyboard navigation submap — active while hyprexpo overview is open
submap = hyprexpo
bind = SUPER, tab, hyprexpo:expo, cancel
bind = , left,   hyprexpo:kb_focus, left
bind = , right,  hyprexpo:kb_focus, right
bind = , up,     hyprexpo:kb_focus, up
bind = , down,   hyprexpo:kb_focus, down
bind = , return,  hyprexpo:kb_confirm
bind = , escape,  hyprexpo:expo, cancel
bind = , tab,     hyprexpo:expo, select
bind = , 1, hyprexpo:kb_selecti, 1
bind = , 2, hyprexpo:kb_selecti, 2
bind = , 3, hyprexpo:kb_selecti, 3
bind = , 4, hyprexpo:kb_selecti, 4
bind = , 5, hyprexpo:kb_selecti, 5
bind = , 6, hyprexpo:kb_selecti, 6
bind = , 7, hyprexpo:kb_selecti, 7
bind = , 8, hyprexpo:kb_selecti, 8
bind = , 9, hyprexpo:kb_selecti, 9
bind = , 0, hyprexpo:kb_selecti, 10
submap = reset
